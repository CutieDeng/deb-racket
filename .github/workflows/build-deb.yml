# GENERATED DEB PACKAGING METADATA - DO NOT EDIT IN deb-racket.
# Source of truth: https://github.com/CutieDeng/package-racket
# Humans and LLM agents must change package-racket and regenerate; manual deb-racket edits are not production-safe.

name: deb build and release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    name: build ${{ matrix.deb_system }} ${{ matrix.deb_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 'debian12-amd64'
            deb_system: 'debian12'
            deb_release: '4'
            deb_arch: 'amd64'
            runner: 'ubuntu-24.04'
            container: 'debian:12'
            jobs: 2
            artifact_name: 'deb-debian12-amd64'
            setup_packages: 'build-essential ca-certificates coreutils curl dpkg-dev file findutils gcc grep gzip libedit-dev libffi-dev libsqlite3-dev libssl-dev make sed tar xz-utils zlib1g-dev'
          - id: 'ubuntu2404-amd64'
            deb_system: 'ubuntu2404'
            deb_release: '4'
            deb_arch: 'amd64'
            runner: 'ubuntu-24.04'
            container: 'ubuntu:24.04'
            jobs: 2
            artifact_name: 'deb-ubuntu2404-amd64'
            setup_packages: 'build-essential ca-certificates coreutils curl dpkg-dev file findutils gcc grep gzip libedit-dev libffi-dev libsqlite3-dev libssl-dev make sed tar xz-utils zlib1g-dev'
          - id: 'debian12-arm64'
            deb_system: 'debian12'
            deb_release: '4'
            deb_arch: 'arm64'
            runner: 'ubuntu-24.04-arm'
            container: 'debian:12'
            jobs: 2
            artifact_name: 'deb-debian12-arm64'
            setup_packages: 'build-essential ca-certificates coreutils curl dpkg-dev file findutils gcc grep gzip libedit-dev libffi-dev libsqlite3-dev libssl-dev make sed tar xz-utils zlib1g-dev'
          - id: 'ubuntu2404-arm64'
            deb_system: 'ubuntu2404'
            deb_release: '4'
            deb_arch: 'arm64'
            runner: 'ubuntu-24.04-arm'
            container: 'ubuntu:24.04'
            jobs: 2
            artifact_name: 'deb-ubuntu2404-arm64'
            setup_packages: 'build-essential ca-certificates coreutils curl dpkg-dev file findutils gcc grep gzip libedit-dev libffi-dev libsqlite3-dev libssl-dev make sed tar xz-utils zlib1g-dev'
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container }}
      options: --user root
    permissions:
      contents: read
    steps:
      - name: Checkout deb-racket
        uses: actions/checkout@v6

      - name: Check generated repository layout
        shell: bash
        run: |
          set -euo pipefail
          test -x scripts/build-deb.sh
          test -x scripts/verify-deb.sh
          test -f SOURCES/.gitkeep

      - name: Install Debian build dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          packages="${{ matrix.setup_packages }}"
          [ -n "$packages" ] || { echo 'matrix setup_packages is empty'; exit 1; }
          apt-get update
          apt-get install -y --no-install-recommends $packages

      - name: Build DEB
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/artifacts" "$GITHUB_WORKSPACE/.build/${{ matrix.id }}"
          mkdir -p "$GITHUB_WORKSPACE/artifacts" "$GITHUB_WORKSPACE/.build"
          scripts/build-deb.sh \
            --artifact-dir "$GITHUB_WORKSPACE/artifacts" \
            --work-dir "$GITHUB_WORKSPACE/.build/${{ matrix.id }}" \
            --deb-system "${{ matrix.deb_system }}" \
            --deb-release "${{ matrix.deb_release }}" \
            --deb-arch "${{ matrix.deb_arch }}" \
            --prefix '/usr' \
            --jobs "${{ matrix.jobs }}"

      - name: Install and uninstall smoke test
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
          PACKAGE_NAME: 'racket9'
          PACKAGE_VERSION: '9.2.1'
        run: |
          set -euo pipefail
          mapfile -t deb_files < <(find "$GITHUB_WORKSPACE/artifacts" -maxdepth 1 -name '*.deb' -type f | sort)
          if [ "${#deb_files[@]}" -ne 1 ]; then
            printf 'Expected exactly one DEB, got %s\n' "${#deb_files[@]}"
            printf '  %s\n' "${deb_files[@]}"
            exit 1
          fi
          apt-get install -y "${deb_files[0]}"
          dpkg -s "$PACKAGE_NAME" >/dev/null
          racket -e '(displayln (version))' | grep -F "$PACKAGE_VERSION"
          racket -e '(displayln f"deb-ci-ok")' | grep -F 'deb-ci-ok'
          racket -e '(require readline/readline) (displayln f"deb-readline-ok")' | grep -F 'deb-readline-ok'
          raco pkg show --all >/tmp/raco-pkgs.txt
          apt-get purge -y "$PACKAGE_NAME"
          if dpkg -s "$PACKAGE_NAME" >/dev/null 2>&1; then
            echo "Package still installed after apt-get purge: $PACKAGE_NAME"
            exit 1
          fi

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*.deb
          if-no-files-found: error

  publish-deb:
    needs: build-deb
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download DEB artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: 'deb-*'
          path: release-assets
          merge-multiple: true

      - name: Publish DEB release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: 'v9.2.1'
          RELEASE_NAME: 'Racket 9.2.1 DEB packages'
          CREATE_RELEASE: 'true'
          PACKAGE_NAME: 'racket9'
          PACKAGE_VERSION: '9.2.1'
          EXPECTED_DEB_COUNT: 4
        run: |
          set -euo pipefail
          command -v gh >/dev/null 2>&1 || { echo 'gh CLI is required on the publish runner'; exit 1; }
          gh --version | sed -n '1,2p'
          gh auth status -h github.com || true
          mapfile -t deb_files < <(find "$GITHUB_WORKSPACE/release-assets" -maxdepth 2 -name '*.deb' -type f | sort)
          printf 'Downloaded DEB files (%s):\n' "${#deb_files[@]}"
          printf '  %s\n' "${deb_files[@]}"
          if [ "${#deb_files[@]}" -ne "$EXPECTED_DEB_COUNT" ]; then
            printf 'Expected %s DEB assets, got %s\n' "$EXPECTED_DEB_COUNT" "${#deb_files[@]}"
            exit 1
          fi
          declare -A seen
          for deb_file in "${deb_files[@]}"; do
            asset_name="${deb_file##*/}"
            if [ -n "${seen[$asset_name]:-}" ]; then
              echo "Duplicate DEB release asset name: $asset_name"
              exit 1
            fi
            seen["$asset_name"]=1
          done
          printf 'Release assets before upload for %s:\n' "$RELEASE_TAG"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$RELEASE_TAG" --jq '.assets[].name' || true
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$CREATE_RELEASE" != true ]; then
              echo "GitHub release does not exist and create-release is false: $RELEASE_TAG"
              exit 1
            fi
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_NAME" --notes "Generated DEB artifacts for $PACKAGE_NAME $PACKAGE_VERSION."
          fi
          printf 'Uploading DEB files to release %s:\n' "$RELEASE_TAG"
          printf '  %s\n' "${deb_files[@]}"
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" "${deb_files[@]}" --clobber
          printf 'Release assets after upload for %s:\n' "$RELEASE_TAG"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$RELEASE_TAG" --jq '.assets[].name'
